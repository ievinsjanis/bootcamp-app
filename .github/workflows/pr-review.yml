name: PR QA Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are a senior QA engineer. Review the changes in this pull request.
            Read CLAUDE.md first for project conventions (severity levels, API envelope shape,
            naming rules, status values). Examine the diff and post a single structured
            QA review comment with findings grouped by: Critical, Major, Minor, Trivial.
            For each finding include: what is wrong, why it matters, and a suggested fix.
            If there are no findings at a severity level, write "None."
